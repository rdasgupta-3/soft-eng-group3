<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Interface - Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .primary-btn { background-color: #007bff; color: white; }
        .secondary-btn { background-color: #6c757d; color: white; }
        .cas-btn { background-color: #cc0033; color: white; } /* Rutgers Red */
        .link-group { display: flex; justify-content: space-between; font-size: 0.8rem; }
        .link-group a { color: #007bff; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Welcome</h2>
    
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    
    <button class="primary-btn" onclick="authenticate()">Log In / Sign Up</button>
    
    <div class="link-group">
        <a onclick="alert('Forgot Password triggered')">Forgot Password?</a>
        <a onclick="alert('Forgot Email triggered')">Forgot Email?</a>
    </div>

    <hr style="width: 100%; border: 0.5px solid #eee;">

    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard"></div>

    <button class="cas-btn" onclick="authenticate()">Log in with Rutgers CAS</button>
</div>

<script>
    // Navigation function for Iteration 1 testing
    function authenticate() {
        window.location.href = 'select.html';
    }

    // Google API Callback
    function handleCredentialResponse(response) {
        console.log("Encoded JWT ID token: " + response.credential);
        window.location.href = 'select.html';
    }
</script>

</body>
</html>
