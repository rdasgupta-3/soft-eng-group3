<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page - LLM Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logo-container">
        <img src="images/logo.png" alt="Logo">
    </div>
    <div class="container login-container">
        <h1>Welcome</h1>
        
        <div id="error-message" style="color: #d32f2f; font-size: 0.9em; margin-bottom: 10px; display: none; background: #ffebee; padding: 8px; border-radius: 4px;"></div>

        <input type="email" id="email" placeholder="Email" class="login-input" required>
        <input type="password" id="password" placeholder="Password" class="login-input" required>
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="attemptLogin()" class="login-button">Log In</button>
            <button onclick="location.href='/signup'" class="login-button secondary">Create Account</button>
        </div>
        
        <hr style="margin: 20px 0;">

        <button onclick="alert('Rutgers CAS Login is coming soon!')" class="login-button full-width cas">
            Log in with Rutgers NetID (CAS) (Coming Soon)
        </button>

        <button onclick="alert('Google Sign-In is coming soon!')" class="login-button full-width google">
            Sign in with Google (Coming Soon)
        </button>
        
        <div class="login-links">
            <a href="/forgot-password">Forgot Password?</a>
            <!-- <a href="#" style="color: #007bff; text-decoration: none;">Forgot Email?</a> -->
        </div>
    </div>

    <script>
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // Standard Email/Password Validation via Backend API
        async function attemptLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('error-message');

            errorDiv.style.display = 'none';

            if (email === "" || password === "") {
                errorDiv.innerText = "Error: Email and password fields cannot be empty.";
                errorDiv.style.display = 'block';
                return;
            }

            if (!emailRegex.test(email)) {
                errorDiv.innerText = "Please enter a valid email address (example@domain.com).";
                errorDiv.style.display = 'block';
                return;
            }

            // Ask the server to verify the credentials
            const response = await fetch('/api/login', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (response.ok) {
                // Success! The server found the user.
                window.location.href = "/choose-player";
            } else {
                // Failure! The server rejected the credentials.
                errorDiv.innerText = result.error;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
