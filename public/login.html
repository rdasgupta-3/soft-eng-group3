<!DOCTYPE html>
<html>
<head>
    <title>Login - LLM Project</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button onclick="location.href='/choose-player'">Login / Sign Up</button>
        <hr>
        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard"></div>
        
        <div class="links">
            <a href="#">Forgot Password?</a>
            <a href="#">Forgot Email?</a>
        </div>
    </div>
    <script>
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            window.location.href = "/choose-player";
        }
    </script>
</body>
</html>
