<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triad.ai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">
    <div class="logo-container">
        <img src="images/logo.png" alt="Logo">
    </div>
    <div class="chat-shell compare-chat-shell">
        <aside class="chat-history-panel">
            <div class="history-header">
                <h2>Chat History</h2>
                <button id="new-chat-btn" type="button" onclick="createNewConversation()">+ New</button>
            </div>
            <div class="history-search-wrap">
                <input type="text" id="history-search" placeholder="Search chats..." oninput="updateHistorySearch(this.value)">
            </div>
            <div id="conversation-list"></div>
            <section class="account-panel" aria-label="User account settings">
                <div class="account-preview">
                    <div id="account-avatar" class="account-avatar default-avatar" aria-hidden="true">U</div>
                    <div>
                        <div id="account-display" class="account-display">User</div>
                        <button id="edit-account-btn" type="button" onclick="toggleProfileEditor()">Customize account</button>
                    </div>
                </div>
                <div id="profile-editor" class="profile-editor" hidden>
                    <label for="profile-name">Display name</label>
                    <input id="profile-name" type="text" placeholder="Display name">
                    <label for="profile-picture">Profile picture</label>
                    <input id="profile-picture" type="file" accept="image/*" onchange="handleProfilePicture(event)">
                    <div class="profile-actions">
                        <button type="button" onclick="saveUserProfile()">Save</button>
                        <button type="button" onclick="resetUserProfile()">Reset</button>
                    </div>
                </div>
            </section>
        </aside>

        <section class="chat-main">
            <header class="chat-header compare-chat-header">
                <div>
                    <h1>Triad.ai</h1>
                    <p>Switch personalities and backend models while asking equations, date/time, and weather questions.</p>
                </div>
                <div class="chat-header-actions">
                    <button id="switch-persona-btn" type="button" class="secondary-action-btn" onclick="switchPersona()">Switch Personality</button>
                    <button id="switch-models-btn" type="button" class="secondary-action-btn" onclick="switchModelPicker()">Choose Models</button>
                    <button onclick="logout()" class="logout-btn inline-logout-btn">Log Out</button>
                </div>
            </header>

            <section class="persona-switcher" aria-label="Current AI personality">
                <div>
                    <p class="selection-label">Current personality</p>
                    <div id="current-persona-name" class="current-persona-name">Mr. Professional</div>
                </div>
                <div id="persona-tone" class="selection-hint">Equation solving with a serious, professional tone.</div>
            </section>

            <section class="selected-models-bar">
                <div>
                    <p class="selection-label">Current models</p>
                    <div id="selected-models" class="selected-model-pill-list"></div>
                </div>
                <div id="selection-status" class="selection-hint"></div>
            </section>

            <div id="chat-window">
                <div id="messages"></div>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your message here..." onkeypress="handleKey(event)">
                <button type="button" onclick="sendMessage()">Send</button>
            </div>
        </section>
    </div>

    <script>
        const STORAGE_KEY = 'llmChatConversations';
        const ACTIVE_KEY = 'llmActiveConversationId';
        const SELECTED_MODELS_KEY = 'llmSelectedModelIds';
        const SELECTED_PERSONA_KEY = 'llmSelectedPersonaId';
        const USER_PROFILE_KEY = 'triadUserProfile';
        const useServerApi = (
            typeof window.fetch === 'function' &&
            window.location.protocol.startsWith('http') &&
            !/jsdom/i.test(window.navigator.userAgent || '')
        );

        const fallbackCatalog = [
            { id: 'ollama-llama3.2-1b', name: 'Local Llama 3.2 1B', access: 'local', provider: 'ollama' },
            { id: 'openai-gpt-4o-mini', name: 'GPT-4o Mini', access: 'public', provider: 'openai' },
            { id: 'google-gemini-2.0-flash', name: 'Gemini 2.0 Flash', access: 'public', provider: 'google' },
            { id: 'anthropic-claude-3-5-haiku', name: 'Claude 3.5 Haiku', access: 'public', provider: 'anthropic' },
            { id: 'ollama-qwen2.5-1.5b', name: 'Local Qwen 2.5 1.5B', access: 'local', provider: 'ollama' }
        ];
        const fallbackDefaultIds = ['ollama-llama3.2-1b', 'openai-gpt-4o-mini', 'google-gemini-2.0-flash'];
        const personaCatalog = [
            { id: 'professional', name: 'Mr. Professional', tone: 'Serious, precise answers with a professional tone.', avatar: 'images/image_6.png' },
            { id: 'sweetheart', name: 'Miss Sweetheart', tone: 'Warm, encouraging answers with exact practical details.', avatar: 'images/image_4.png' },
            { id: 'silly', name: 'Lord Silly the Ninth', tone: 'Useful answers with a ridiculous royal tone.', avatar: 'images/image_5.png' }
        ];

        let conversations = [];
        let activeConversationId = null;
        let historySearchQuery = '';
        let selectedModelIds = [];
        let currentPersonaId = 'professional';

        // Apply persona theme on load
        function applyPersonaTheme(personaId) {
            currentPersonaId = personaId;
            document.body.classList.remove('persona-sweetheart', 'persona-silly', 'persona-professional');
            document.body.classList.add(`persona-${personaId}`);
        }
        let modelCatalog = [...fallbackCatalog];
        let selectedPersonaId = 'professional';
        let typingIndicatorVisible = false;
        let currentUserEmail = 'User';
        let userProfile = { displayName: '', avatar: '' };

        function uniqueIds(ids) {
            return [...new Set((ids || []).filter(id => typeof id === 'string'))];
        }

        function normalizeSelectedModelIds(ids) {
            const validIds = uniqueIds(ids).filter(id => modelCatalog.some(model => model.id === id));
            const limitedIds = validIds.slice(0, 3);
            return limitedIds.length ? limitedIds : [...fallbackDefaultIds];
        }

        function modelNameFor(modelId) {
            const model = modelCatalog.find(entry => entry.id === modelId);
            return model ? model.name : modelId;
        }

        function parseSelectedModelsFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const raw = params.get('models');
            if (!raw) {
                return [];
            }

            return raw.split(',').map(value => value.trim()).filter(Boolean);
        }

        function parsePersonaFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const persona = params.get('persona');
            return personaCatalog.some(entry => entry.id === persona) ? persona : '';
        }

        function loadSelectedPersona() {
            const incoming = parsePersonaFromUrl();
            const saved = localStorage.getItem(SELECTED_PERSONA_KEY);
            selectedPersonaId = incoming || (personaCatalog.some(entry => entry.id === saved) ? saved : 'professional');
            localStorage.setItem(SELECTED_PERSONA_KEY, selectedPersonaId);
            applyPersonaTheme(selectedPersonaId);
        }

        function getSelectedPersona() {
            return personaCatalog.find(persona => persona.id === selectedPersonaId) || personaCatalog[0];
        }

        function loadUserProfile() {
            try {
                const saved = JSON.parse(localStorage.getItem(USER_PROFILE_KEY) || '{}');
                userProfile = {
                    displayName: typeof saved.displayName === 'string' ? saved.displayName : '',
                    avatar: typeof saved.avatar === 'string' ? saved.avatar : ''
                };
            } catch (error) {
                userProfile = { displayName: '', avatar: '' };
            }
        }

        async function loadCurrentUser() {
            if (!useServerApi) {
                currentUserEmail = 'User';
                return;
            }

            try {
                const response = await fetch('/api/me');
                if (response.ok) {
                    const payload = await response.json();
                    currentUserEmail = payload.email || 'User';
                }
            } catch (error) {
                currentUserEmail = 'User';
            }
        }

        function currentUserName() {
            return userProfile.displayName.trim() || currentUserEmail;
        }

        function defaultInitial(name) {
            return (name || 'U').trim().charAt(0).toUpperCase() || 'U';
        }

        function createAvatar(src, name, className = '') {
            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${className}`.trim();
            if (src) {
                const img = document.createElement('img');
                img.src = src;
                img.alt = name;
                avatar.appendChild(img);
                return avatar;
            }

            avatar.classList.add('default-avatar');
            avatar.textContent = defaultInitial(name);
            return avatar;
        }

        function renderAccountPanel() {
            const name = currentUserName();
            const avatar = document.getElementById('account-avatar');
            const display = document.getElementById('account-display');
            const input = document.getElementById('profile-name');

            avatar.innerHTML = '';
            avatar.textContent = '';
            if (userProfile.avatar) {
                const img = document.createElement('img');
                img.src = userProfile.avatar;
                img.alt = name;
                avatar.appendChild(img);
                avatar.classList.remove('default-avatar');
            } else {
                avatar.classList.add('default-avatar');
                avatar.textContent = defaultInitial(name);
            }

            display.textContent = name;
            input.value = userProfile.displayName;
        }

        function toggleProfileEditor() {
            const editor = document.getElementById('profile-editor');
            editor.hidden = !editor.hidden;
        }

        function handleProfilePicture(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                userProfile.avatar = reader.result;
                renderAccountPanel();
                renderMessages();
            };
            reader.readAsDataURL(file);
        }

        function saveUserProfile() {
            userProfile.displayName = document.getElementById('profile-name').value.trim();
            localStorage.setItem(USER_PROFILE_KEY, JSON.stringify(userProfile));
            document.getElementById('profile-editor').hidden = true;
            renderAccountPanel();
            renderMessages();
        }

        function resetUserProfile() {
            userProfile = { displayName: '', avatar: '' };
            localStorage.removeItem(USER_PROFILE_KEY);
            document.getElementById('profile-picture').value = '';
            renderAccountPanel();
            renderMessages();
        }

        function formatMessageTime(timestamp) {
            if (!timestamp) {
                return 'just now';
            }

            const elapsedMs = Date.now() - timestamp;
            if (elapsedMs < 60 * 1000) {
                return 'just now';
            }

            return new Date(timestamp).toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        function loadSelectedModels() {
            let saved = [];
            try {
                saved = JSON.parse(localStorage.getItem(SELECTED_MODELS_KEY) || '[]');
            } catch (error) {
                saved = [];
            }

            const incomingSelection = parseSelectedModelsFromUrl();
            selectedModelIds = normalizeSelectedModelIds(incomingSelection.length ? incomingSelection : saved);
            localStorage.setItem(SELECTED_MODELS_KEY, JSON.stringify(selectedModelIds));
        }

        async function loadModelCatalog() {
            if (!useServerApi) {
                modelCatalog = [...fallbackCatalog];
                return;
            }

            const response = await fetch('/api/models');
            if (response.status === 401) {
                window.location.href = '/';
                return;
            }
            if (!response.ok) {
                throw new Error('Failed to load models.');
            }

            const payload = await response.json();
            modelCatalog = Array.isArray(payload.models) && payload.models.length ? payload.models : [...fallbackCatalog];
            const defaults = Array.isArray(payload.defaultModelIds) ? payload.defaultModelIds : fallbackDefaultIds;
            selectedModelIds = normalizeSelectedModelIds(selectedModelIds.length ? selectedModelIds : defaults);
            localStorage.setItem(SELECTED_MODELS_KEY, JSON.stringify(selectedModelIds));
        }

        function buildConversation(modelIds = []) {
            const now = Date.now();
            return {
                id: `conv-${now}-${Math.floor(Math.random() * 10000)}`,
                title: 'New Conversation',
                pinned: false,
                isDraft: false,
                updatedAt: now,
                selectedModelIds: normalizeSelectedModelIds(modelIds),
                messages: []
            };
        }

        function buildDraftConversation(modelIds = []) {
            const draft = buildConversation(modelIds);
            draft.isDraft = true;
            return draft;
        }

        function saveConversations() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
            localStorage.setItem(ACTIVE_KEY, activeConversationId);
        }

        function loadConversationsFromLocal() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                conversations = saved ? JSON.parse(saved) : [];
            } catch (error) {
                conversations = [];
            }

            activeConversationId = localStorage.getItem(ACTIVE_KEY);

            if (!conversations.length) {
                const first = buildConversation(selectedModelIds);
                conversations.push(first);
                activeConversationId = first.id;
                saveConversations();
            }

            if (!conversations.find(c => c.id === activeConversationId)) {
                activeConversationId = conversations[0].id;
            }
        }

        async function syncConversationsFromServer() {
            const response = await fetch('/api/conversations');
            if (response.status === 401) {
                window.location.href = '/';
                return;
            }
            if (!response.ok) {
                throw new Error('Failed to load conversations from server.');
            }

            const payload = await response.json();
            conversations = Array.isArray(payload.conversations) ? payload.conversations : [];

            if (conversations.length && !conversations.find(c => c.id === activeConversationId)) {
                activeConversationId = conversations[0].id;
            }

            saveConversations();
            renderConversationList();
            renderMessages();
            renderSelectedModels();
        }

        function getActiveConversation() {
            return conversations.find(c => c.id === activeConversationId);
        }

        function ensureDraftConversation() {
            if (conversations.length) {
                return;
            }

            const draft = buildDraftConversation(selectedModelIds);
            conversations = [draft];
            activeConversationId = draft.id;
        }

        function openFreshDraftSession(modelIds = selectedModelIds) {
            const draft = buildDraftConversation(modelIds);
            conversations.unshift(draft);
            activeConversationId = draft.id;
        }

        function sortedConversations() {
            return [...conversations].sort((a, b) => {
                if (a.pinned !== b.pinned) {
                    return a.pinned ? -1 : 1;
                }
                return b.updatedAt - a.updatedAt;
            });
        }

        function updateHistorySearch(value) {
            historySearchQuery = (value || '').trim().toLowerCase();
            renderConversationList();
        }

        function conversationMatchesSearch(conv) {
            if (!historySearchQuery) {
                return true;
            }

            const titleText = (conv.title || '').toLowerCase();
            const modelText = (conv.selectedModelIds || []).map(modelNameFor).join(' ').toLowerCase();
            const messageText = (conv.messages || [])
                .map(m => (m && m.text ? m.text : ''))
                .join(' ')
                .toLowerCase();

            return titleText.includes(historySearchQuery) || modelText.includes(historySearchQuery) || messageText.includes(historySearchQuery);
        }

        function hasUserMessages(conv) {
            return (conv.messages || []).some(msg => msg && msg.type === 'user-bubble' && (msg.text || '').trim().length > 0);
        }

        function renderConversationList() {
            const list = document.getElementById('conversation-list');
            list.innerHTML = '';

            const ordered = sortedConversations().filter(conversationMatchesSearch);
            if (!ordered.length) {
                const empty = document.createElement('div');
                empty.className = 'history-empty-state';
                empty.textContent = historySearchQuery ? 'No matching conversations.' : 'No conversations yet.';
                list.appendChild(empty);
                return;
            }

            const pinned = ordered.filter(conv => conv.pinned);
            const unpinned = ordered.filter(conv => !conv.pinned);

            function appendConversationItem(conv) {
                const item = document.createElement('div');
                item.className = `history-item ${conv.id === activeConversationId ? 'active' : ''}`;
                item.onclick = () => switchConversation(conv.id);

                const title = document.createElement('div');
                title.className = 'history-title';
                title.textContent = conv.title;

                const preview = document.createElement('div');
                preview.className = 'history-preview';
                const last = conv.messages[conv.messages.length - 1];
                preview.textContent = last ? last.text : `Models: ${(conv.selectedModelIds || []).map(modelNameFor).join(', ')}`;

                const meta = document.createElement('div');
                meta.className = 'history-model-summary';
                meta.textContent = (conv.selectedModelIds || []).map(modelNameFor).join(' | ');

                item.appendChild(title);
                item.appendChild(preview);
                item.appendChild(meta);

                if (hasUserMessages(conv)) {
                    const pinBtn = document.createElement('button');
                    pinBtn.type = 'button';
                    pinBtn.className = 'history-pin-btn';
                    pinBtn.textContent = conv.pinned ? 'PINNED' : 'PIN';
                    pinBtn.title = conv.pinned ? 'Unpin conversation' : 'Pin conversation';
                    pinBtn.setAttribute('aria-label', pinBtn.title);
                    pinBtn.onclick = (event) => {
                        event.stopPropagation();
                        togglePin(conv.id);
                    };

                    const deleteBtn = document.createElement('button');
                    deleteBtn.type = 'button';
                    deleteBtn.className = 'history-delete-btn';
                    deleteBtn.textContent = 'X';
                    deleteBtn.title = 'Delete conversation';
                    deleteBtn.setAttribute('aria-label', deleteBtn.title);
                    deleteBtn.onclick = (event) => {
                        event.stopPropagation();
                        deleteConversation(conv.id);
                    };

                    const actions = document.createElement('div');
                    actions.className = 'history-actions';
                    actions.appendChild(pinBtn);
                    actions.appendChild(deleteBtn);
                    item.appendChild(actions);
                }

                list.appendChild(item);
            }

            if (pinned.length) {
                const pinnedLabel = document.createElement('div');
                pinnedLabel.className = 'history-separator';
                pinnedLabel.textContent = 'STARRED';
                list.appendChild(pinnedLabel);
            }

            pinned.forEach(appendConversationItem);

            if (pinned.length && unpinned.length) {
                const divider = document.createElement('div');
                divider.className = 'history-divider';
                list.appendChild(divider);
            }

            unpinned.forEach(appendConversationItem);
        }

        function renderSelectedModels() {
            const active = getActiveConversation();
            const effectiveModelIds = normalizeSelectedModelIds(active && active.selectedModelIds ? active.selectedModelIds : selectedModelIds);
            selectedModelIds = effectiveModelIds;
            localStorage.setItem(SELECTED_MODELS_KEY, JSON.stringify(selectedModelIds));

            const list = document.getElementById('selected-models');
            const status = document.getElementById('selection-status');
            list.innerHTML = '';

            effectiveModelIds.forEach(modelId => {
                const pill = document.createElement('span');
                pill.className = 'selected-model-pill';
                pill.textContent = modelNameFor(modelId);
                list.appendChild(pill);
            });

            status.textContent = `${effectiveModelIds.length} active model${effectiveModelIds.length === 1 ? '' : 's'} in this conversation.`;
        }

        function renderSelectedPersona() {
            const persona = getSelectedPersona();
            document.getElementById('current-persona-name').textContent = persona.name;
            document.getElementById('persona-tone').textContent = persona.tone;
            applyPersonaTheme(persona.id);
        }

        function showTypingIndicator() {
            typingIndicatorVisible = true;
            renderMessages();
        }

        function hideTypingIndicator() {
            typingIndicatorVisible = false;
            renderMessages();
        }

        function renderMessages() {
            const msgContainer = document.getElementById('messages');
            const current = getActiveConversation();
            msgContainer.innerHTML = '';

            if (!current) {
                return;
            }

            function appendUserMessage(msg) {
                const name = msg.authorName || currentUserName();
                const avatarSrc = msg.authorAvatar || userProfile.avatar;
                const row = document.createElement('div');
                row.className = 'message-row user-message-row';

                const bubbleWrap = document.createElement('div');
                bubbleWrap.className = 'message-stack user-message-stack';

                const meta = document.createElement('div');
                meta.className = 'message-meta user-message-meta';
                meta.textContent = `${name} | ${formatMessageTime(msg.at)}`;

                const bubble = document.createElement('div');
                bubble.className = 'bubble user-bubble';
                bubble.textContent = msg.text;

                bubbleWrap.appendChild(meta);
                bubbleWrap.appendChild(bubble);
                row.appendChild(bubbleWrap);
                row.appendChild(createAvatar(avatarSrc, name, 'user-avatar'));
                msgContainer.appendChild(row);
            }

            function appendAiGroup(group) {
                const first = group[0];
                const persona = personaCatalog.find(entry => entry.id === first.personaId) || getSelectedPersona();
                const personaName = first.personaName || persona.name;
                const personaAvatar = first.personaAvatar || persona.avatar;
                const row = document.createElement('div');
                row.className = 'message-row ai-message-row';

                row.appendChild(createAvatar(personaAvatar, personaName, 'persona-avatar'));

                const groupEl = document.createElement('section');
                groupEl.className = 'ai-response-group';

                const header = document.createElement('div');
                header.className = 'ai-response-header';
                header.textContent = `${personaName} responded | ${formatMessageTime(first.at)}`;
                groupEl.appendChild(header);

                group.forEach(msg => {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble ai-bubble model-response-card';
                    if (msg.modelId) {
                        bubble.dataset.modelId = msg.modelId;
                    }

                    if (msg.modelName) {
                        const label = document.createElement('div');
                        label.className = 'model-reply-label';
                        label.textContent = `${msg.modelName}${msg.status === 'error' ? ' | handled error' : ''}`;
                        bubble.appendChild(label);
                    }

                    const content = document.createElement('div');
                    content.textContent = msg.text;
                    bubble.appendChild(content);
                    groupEl.appendChild(bubble);
                });

                row.appendChild(groupEl);
                msgContainer.appendChild(row);
            }

            for (let index = 0; index < current.messages.length; index += 1) {
                const msg = current.messages[index];
                if (msg.type === 'user-bubble') {
                    appendUserMessage(msg);
                    continue;
                }

                const group = [];
                while (index < current.messages.length && current.messages[index].type === 'ai-bubble') {
                    group.push(current.messages[index]);
                    index += 1;
                }
                index -= 1;
                appendAiGroup(group);
            }

            if (typingIndicatorVisible) {
                const persona = getSelectedPersona();
                const row = document.createElement('div');
                row.className = 'message-row ai-message-row';
                row.appendChild(createAvatar(persona.avatar, persona.name, 'persona-avatar'));

                const bubble = document.createElement('div');
                bubble.className = 'typing-bubble';

                const content = document.createElement('div');
                content.className = 'typing-text';
                content.textContent = `${persona.name} is thinking`;

                const dots = document.createElement('span');
                dots.className = 'typing-dots';
                dots.setAttribute('aria-hidden', 'true');
                dots.textContent = '...';

                content.appendChild(dots);
                bubble.appendChild(content);
                row.appendChild(bubble);
                msgContainer.appendChild(row);
            }

            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        function switchConversation(conversationId) {
            activeConversationId = conversationId;
            saveConversations();
            renderConversationList();
            renderMessages();
            renderSelectedModels();
        }

        function switchModelPicker() {
            localStorage.setItem(SELECTED_MODELS_KEY, JSON.stringify(selectedModelIds));
            localStorage.setItem(SELECTED_PERSONA_KEY, selectedPersonaId);
            window.location.href = `/choose-player?persona=${encodeURIComponent(selectedPersonaId)}`;
        }

        function switchPersona() {
            const currentIndex = personaCatalog.findIndex(persona => persona.id === selectedPersonaId);
            selectedPersonaId = personaCatalog[(currentIndex + 1) % personaCatalog.length].id;
            localStorage.setItem(SELECTED_PERSONA_KEY, selectedPersonaId);
            renderSelectedPersona();
        }

        function createNewConversation() {
            const current = getActiveConversation();
            const currentIsEmpty = current && Array.isArray(current.messages) && current.messages.length === 0;
            if (currentIsEmpty) {
                current.selectedModelIds = [...selectedModelIds];
                activeConversationId = current.id;
                saveConversations();
                renderConversationList();
                renderMessages();
                renderSelectedModels();
                return;
            }

            if (useServerApi) {
                (async () => {
                    try {
                        const res = await fetch('/api/conversations', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ selectedModelIds })
                        });
                        const data = await res.json();
                        await syncConversationsFromServer();
                        activeConversationId = data.conversation.id;
                        renderConversationList();
                        renderMessages();
                        renderSelectedModels();
                    } catch (err) {
                        console.error('Failed to create conversation:', err);
                    }
                })();
                return;
            }

            const created = buildConversation(selectedModelIds);
            conversations.push(created);
            activeConversationId = created.id;
            saveConversations();
            renderConversationList();
            renderMessages();
            renderSelectedModels();
        }

        function togglePin(conversationId) {
            const conv = conversations.find(c => c.id === conversationId);
            if (!conv) {
                return;
            }

            if (useServerApi) {
                (async () => {
                    try {
                        await fetch(`/api/conversations/${conversationId}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ pinned: !conv.pinned })
                        });
                        await syncConversationsFromServer();
                    } catch (error) {
                        console.error(error);
                    }
                })();
                return;
            }

            conv.pinned = !conv.pinned;
            conv.updatedAt = Date.now();
            saveConversations();
            renderConversationList();
        }

        function deleteConversation(conversationId) {
            const conv = conversations.find(c => c.id === conversationId);
            if (!conv) {
                return;
            }

            const shouldDelete = window.confirm(`Delete conversation "${conv.title}"?`);
            if (!shouldDelete) {
                return;
            }

            if (useServerApi) {
                (async () => {
                    try {
                        await fetch(`/api/conversations/${conversationId}`, {
                            method: 'DELETE'
                        });
                        await syncConversationsFromServer();
                    } catch (error) {
                        console.error(error);
                    }
                })();
                return;
            }

            const wasActive = (conversationId === activeConversationId);
            conversations = conversations.filter(c => c.id !== conversationId);

            if (!conversations.length) {
                const created = buildConversation(selectedModelIds);
                conversations.push(created);
                activeConversationId = created.id;
            } else if (wasActive) {
                activeConversationId = sortedConversations()[0].id;
            }

            saveConversations();
            renderConversationList();
            renderMessages();
            renderSelectedModels();
        }

        async function addMessage(type, text, metadata = {}) {
            const current = getActiveConversation();
            if (!current) {
                return;
            }

            if (useServerApi) {
                let targetConversationId = current.id;

                if (current.isDraft && type === 'user-bubble') {
                    const createResponse = await fetch('/api/conversations', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ selectedModelIds })
                    });

                    if (createResponse.status === 401) {
                        window.location.href = '/';
                        return;
                    }

                    if (!createResponse.ok) {
                        throw new Error('Failed to create conversation.');
                    }

                    const createPayload = await createResponse.json();
                    if (!createPayload || !createPayload.conversation || !createPayload.conversation.id) {
                        throw new Error('Invalid conversation response from server.');
                    }

                    targetConversationId = createPayload.conversation.id;
                    activeConversationId = targetConversationId;
                }

                const response = await fetch(`/api/conversations/${targetConversationId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, text, metadata })
                });

                if (response.status === 401) {
                    window.location.href = '/';
                    return;
                }

                await syncConversationsFromServer();
                return;
            }

            current.messages.push({
                type,
                text,
                at: Date.now(),
                modelId: metadata.modelId || null,
                modelName: metadata.modelName || null,
                provider: metadata.provider || null,
                status: metadata.status || 'ok',
                personaId: metadata.personaId || null,
                personaName: metadata.personaName || null,
                personaAvatar: metadata.personaAvatar || null,
                authorName: metadata.authorName || null,
                authorAvatar: metadata.authorAvatar || null,
                techniques: Array.isArray(metadata.techniques) ? metadata.techniques : [],
                toolCalls: Array.isArray(metadata.toolCalls) ? metadata.toolCalls : [],
                retrievedContext: Array.isArray(metadata.retrievedContext) ? metadata.retrievedContext : [],
                inContextExamples: Array.isArray(metadata.inContextExamples) ? metadata.inContextExamples : [],
                reasoningSummary: Array.isArray(metadata.reasoningSummary) ? metadata.reasoningSummary : []
            });

            if (current.title === 'New Conversation' && type === 'user-bubble') {
                current.title = text.length > 28 ? `${text.slice(0, 28)}...` : text;
            }

            current.selectedModelIds = [...selectedModelIds];
            current.updatedAt = Date.now();
            saveConversations();
            renderConversationList();
            renderMessages();
            renderSelectedModels();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) {
                return;
            }

            await addMessage('user-bubble', text, {
                authorName: currentUserName(),
                authorAvatar: userProfile.avatar
            });
            input.value = '';
            showTypingIndicator();

            if (useServerApi) {
                const current = getActiveConversation();
                if (!current) {
                    hideTypingIndicator();
                    return;
                }

                try {
                    const response = await fetch(`/api/conversations/${current.id}/ai-reply`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ selectedModelIds, personaId: selectedPersonaId })
                    });

                    if (response.status === 401) {
                        window.location.href = '/';
                        return;
                    }

                    if (!response.ok) {
                        const payload = await response.json().catch(() => ({}));
                        throw new Error(payload.error || 'The assistant could not generate a response.');
                    }

                    await syncConversationsFromServer();
                } catch (error) {
                    await addMessage('ai-bubble', `${getSelectedPersona().name} could not complete that request: ${error.message}`, {
                        modelName: getSelectedPersona().name,
                        personaId: getSelectedPersona().id,
                        personaName: getSelectedPersona().name,
                        personaAvatar: getSelectedPersona().avatar,
                        status: 'error'
                    });
                } finally {
                    hideTypingIndicator();
                }
                    return;
            }

            setTimeout(() => {
                selectedModelIds.forEach(modelId => {
                    addMessage('ai-bubble', `${modelNameFor(modelId)} received your prompt. Connect a live provider to replace this placeholder reply.`, {
                        modelId,
                        modelName: modelNameFor(modelId),
                        provider: (modelCatalog.find(model => model.id === modelId) || {}).provider || 'unknown',
                        personaId: getSelectedPersona().id,
                        personaName: getSelectedPersona().name,
                        personaAvatar: getSelectedPersona().avatar,
                        status: 'ok'
                    });
                });
                hideTypingIndicator();
            }, 450);
        }

        function handleKey(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        async function logout() {
            if (typeof window.fetch === 'function' && window.location.protocol.startsWith('http')) {
                try {
                    await fetch('/api/logout', { method: 'POST' });
                } catch (error) {
                    console.error(error);
                }
            }

            window.location.href = '/';
        }

        async function initChat() {
            loadUserProfile();
            await loadCurrentUser();
            renderAccountPanel();
            loadSelectedPersona();
            loadSelectedModels();

            try {
                await loadModelCatalog();
            } catch (error) {
                console.error(error);
            }

            if (useServerApi) {
                try {
                    await syncConversationsFromServer();
                    openFreshDraftSession(selectedModelIds);
                    saveConversations();
                    renderConversationList();
                    renderMessages();
                    renderSelectedModels();
                    renderSelectedPersona();
                } catch (error) {
                    console.error(error);
                    ensureDraftConversation();
                    renderConversationList();
                    renderMessages();
                    renderSelectedModels();
                    renderSelectedPersona();
                }
                return;
            }

            loadConversationsFromLocal();
            const current = getActiveConversation();
            if (current && (!current.selectedModelIds || parseSelectedModelsFromUrl().length)) {
                current.selectedModelIds = [...selectedModelIds];
                saveConversations();
            }
            renderConversationList();
            renderMessages();
            renderSelectedModels();
            renderSelectedPersona();
        }

        initChat();
    </script>
</body>
</html>
