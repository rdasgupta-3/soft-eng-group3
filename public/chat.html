<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - LLM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <button class="logout-btn" onclick="location.href='/'" style="float: right; background-color: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer;">Log Out</button>
        
        <h1>AI Chat Interface</h1>

        <div id="chat-history" style="height: 300px; border: 1px solid #ccc; border-radius: 4px; padding: 10px; margin-bottom: 10px; overflow-y: auto; background: #f9f9f9;">
            <div class="ai-bubble" style="background: #e9ecef; padding: 8px; border-radius: 4px; margin-bottom: 10px; width: fit-content;">
                Hello! I am your selected AI. How can I help you?
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="chat-input" placeholder="Type your message..." style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" required>
            <button id="send-btn" onclick="sendMessage()" style="background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">Send</button>
        </div>
    </div>

    <script>
        // Mock Chat Logic to pass the UI tests
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const history = document.getElementById('chat-history');
            const message = input.value.trim();

            if (!message) return;

            // 1. Render User Message (Cucumber looks for .user-bubble)
            history.innerHTML += `
                <div class="user-bubble" style="background: #007bff; color: white; padding: 8px; border-radius: 4px; margin-bottom: 10px; width: fit-content; margin-left: auto;">
                    ${message}
                </div>`;
            
            // Clear the input box
            input.value = '';

            // 2. Simulate AI Response after 500ms (Cucumber looks for .ai-bubble)
            setTimeout(() => {
                history.innerHTML += `
                    <div class="ai-bubble" style="background: #e9ecef; color: black; padding: 8px; border-radius: 4px; margin-bottom: 10px; width: fit-content;">
                        I am a placeholder AI response!
                    </div>`;
                // Auto-scroll to bottom
                history.scrollTop = history.scrollHeight;
            }, 500);
        }
    </script>
</body>
</html>
