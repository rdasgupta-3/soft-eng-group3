<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - LLM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">
    <div class="chat-shell">
        <aside class="chat-history-panel">
            <div class="history-header">
                <h2>Chat History</h2>
                <button id="new-chat-btn" type="button" onclick="createNewConversation()">+ New</button>
            </div>
            <div class="history-search-wrap">
                <input type="text" id="history-search" placeholder="Search chats..." oninput="updateHistorySearch(this.value)">
            </div>
            <div id="conversation-list"></div>
        </aside>

        <section class="chat-main">
            <header class="chat-header">
                <div class="chat-header-info">
                    <h1>AI Chat Assistant</h1>
                    <div id="chat-persona-badge"></div>
                </div>
                <button onclick="openSettings()" class="settings-btn" title="Accessibility settings">Accessibility</button>
            </header>

            <div id="ollama-warning" style="display: none; margin: 10px 16px 0; padding: 12px; background: #ffdddd; color: #a00; border: 1px solid #a00; border-radius: 6px; font-size: 0.9rem;">
                <strong>Ollama is not running.</strong> Please start Ollama, then refresh this page.<br>
                Install from <a href="https://ollama.com" target="_blank" rel="noopener noreferrer" style="color: #a00;">https://ollama.com</a> and run: <code>ollama serve</code>
            </div>

            <div id="chat-window">
                <div id="messages"></div>
            </div>

            <div class="model-selector" id="model-selector" style="display:none;">
                <span class="model-selector-label">Compare&nbsp;Models:</span>
                <div id="model-checkboxes" class="model-checkboxes"></div>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your message here..." onkeypress="handleKey(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </section>
    </div>

    <script>
        const STORAGE_KEY = 'llmChatConversations';
        const ACTIVE_KEY = 'llmActiveConversationId';
        const useServerApi = (
            typeof window.fetch === 'function' &&
            window.location.protocol.startsWith('http') &&
            !/jsdom/i.test(window.navigator.userAgent || '')
        );

        let conversations = [];
        let activeConversationId = null;
        let historySearchQuery = '';

        const PERSONA_BADGES = {
            sweetheart:   { emoji: '💗', label: 'Miss Sweetheart' },
            professional: { emoji: '💼', label: 'Mr. Professional' },
            silly:        { emoji: '👑', label: 'Lord Silly' }
        };

        function getPagePersona() {
            return new URLSearchParams(window.location.search).get('persona') || null;
        }

        function loadConversationsFromLocal() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                conversations = saved ? JSON.parse(saved) : [];
            } catch (error) {
                conversations = [];
            }

            activeConversationId = localStorage.getItem(ACTIVE_KEY);

            if (!conversations.length) {
                const first = buildConversation();
                conversations.push(first);
                activeConversationId = first.id;
                saveConversations();
            }

            if (!conversations.find(c => c.id === activeConversationId)) {
                activeConversationId = conversations[0].id;
            }
        }

        async function syncConversationsData() {
            const response = await fetch('/api/conversations');
            if (response.status === 401) {
                window.location.href = '/';
                return;
            }
            if (!response.ok) {
                throw new Error('Failed to load conversations from server.');
            }

            const payload = await response.json();
            conversations = Array.isArray(payload.conversations) ? payload.conversations : [];

            if (conversations.length && !conversations.find(c => c.id === activeConversationId)) {
                activeConversationId = conversations[0].id;
            }

            saveConversations();
        }

        async function syncConversationsFromServer() {
            await syncConversationsData();
            renderConversationList();
            renderMessages();
        }

        function saveConversations() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
            localStorage.setItem(ACTIVE_KEY, activeConversationId);
        }

        function buildConversation() {
            const now = Date.now();
            return {
                id: `conv-${now}-${Math.floor(Math.random() * 10000)}`,
                title: 'New Conversation',
                pinned: false,
                isDraft: false,
                updatedAt: now,
                messages: []
            };
        }

        function buildDraftConversation() {
            const draft = buildConversation();
            draft.isDraft = true;
            return draft;
        }

        function ensureDraftConversation() {
            if (conversations.length) {
                return;
            }

            const draft = buildDraftConversation();
            conversations = [draft];
            activeConversationId = draft.id;
        }

        function openFreshDraftSession() {
            const draft = buildDraftConversation();
            conversations.unshift(draft);
            activeConversationId = draft.id;
        }

        function getActiveConversation() {
            return conversations.find(c => c.id === activeConversationId);
        }

        function sortedConversations() {
            return [...conversations].sort((a, b) => {
                if (a.pinned !== b.pinned) {
                    return a.pinned ? -1 : 1;
                }
                return b.updatedAt - a.updatedAt;
            });
        }

        function updateHistorySearch(value) {
            historySearchQuery = (value || '').trim().toLowerCase();
            renderConversationList();
        }

        function conversationMatchesSearch(conv) {
            if (!historySearchQuery) {
                return true;
            }

            const titleText = (conv.title || '').toLowerCase();
            const messageText = (conv.messages || [])
                .map(m => (m && m.text ? m.text : ''))
                .join(' ')
                .toLowerCase();

            return titleText.includes(historySearchQuery) || messageText.includes(historySearchQuery);
        }

        function hasUserMessages(conv) {
            return (conv.messages || []).some(msg => msg && msg.type === 'user-bubble' && (msg.text || '').trim().length > 0);
        }

        function renderConversationList() {
            const list = document.getElementById('conversation-list');
            list.innerHTML = '';

            const ordered = sortedConversations().filter(c => c.messages.length > 0).filter(conversationMatchesSearch);
            if (!ordered.length) {
                const empty = document.createElement('div');
                empty.className = 'history-empty-state';
                empty.innerText = historySearchQuery ? 'No matching conversations.' : 'No conversations yet.';
                list.appendChild(empty);
                return;
            }

            const pinned = ordered.filter(conv => conv.pinned);
            const unpinned = ordered.filter(conv => !conv.pinned);

            function appendConversationItem(conv) {
                const item = document.createElement('div');
                item.className = `history-item ${conv.id === activeConversationId ? 'active' : ''}`;
                item.onclick = () => switchConversation(conv.id);

                const title = document.createElement('div');
                title.className = 'history-title';
                title.innerText = conv.title;

                const badge = conv.persona && PERSONA_BADGES[conv.persona]
                    ? (() => {
                        const b = document.createElement('span');
                        b.className = `persona-badge persona-badge-${conv.persona}`;
                        b.textContent = `${PERSONA_BADGES[conv.persona].emoji} ${PERSONA_BADGES[conv.persona].label}`;
                        return b;
                    })()
                    : null;

                const preview = document.createElement('div');
                preview.className = 'history-preview';
                const last = conv.messages[conv.messages.length - 1];
                preview.innerText = last ? last.text : 'No messages yet';

                item.appendChild(title);
                if (badge) item.appendChild(badge);
                item.appendChild(preview);

                if (hasUserMessages(conv)) {
                    const pinBtn = document.createElement('button');
                    pinBtn.type = 'button';
                    pinBtn.className = 'history-pin-btn';
                    pinBtn.innerText = conv.pinned ? '★' : '☆';
                    pinBtn.title = conv.pinned ? 'Unpin conversation' : 'Pin conversation';
                    pinBtn.setAttribute('aria-label', pinBtn.title);
                    pinBtn.onclick = (event) => {
                        event.stopPropagation();
                        togglePin(conv.id);
                    };

                    const deleteBtn = document.createElement('button');
                    deleteBtn.type = 'button';
                    deleteBtn.className = 'history-delete-btn';
                    deleteBtn.innerText = '×';
                    deleteBtn.title = 'Delete conversation';
                    deleteBtn.setAttribute('aria-label', deleteBtn.title);
                    deleteBtn.onclick = (event) => {
                        event.stopPropagation();
                        deleteConversation(conv.id);
                    };

                    const actions = document.createElement('div');
                    actions.className = 'history-actions';
                    actions.appendChild(pinBtn);
                    actions.appendChild(deleteBtn);
                    item.appendChild(actions);
                }

                list.appendChild(item);
            }

            if (pinned.length) {
                const pinnedLabel = document.createElement('div');
                pinnedLabel.className = 'history-separator';
                pinnedLabel.innerText = 'STARRED';
                list.appendChild(pinnedLabel);
            }

            pinned.forEach(appendConversationItem);

            if (pinned.length && unpinned.length) {
                const divider = document.createElement('div');
                divider.className = 'history-divider';
                list.appendChild(divider);
            }

            unpinned.forEach(appendConversationItem);
        }

        function renderMessages(skipLastAi = false) {
            const msgContainer = document.getElementById('messages');
            const current = getActiveConversation();
            msgContainer.innerHTML = '';

            if (!current) {
                return;
            }

            const messages = [...current.messages];
            if (skipLastAi) {
                const last = messages[messages.length - 1];
                if (last && last.type === 'ai-bubble') {
                    messages.pop();
                }
            }

            messages.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = `bubble ${msg.type}`;
                if (msg.type === 'ai-bubble' && msg.model) {
                    const label = document.createElement('div');
                    label.className = 'ai-model-label';
                    label.textContent = msg.model;
                    bubble.appendChild(label);
                    const textDiv = document.createElement('div');
                    textDiv.className = 'ai-bubble-text';
                    textDiv.innerText = msg.text;
                    bubble.appendChild(textDiv);
                } else {
                    bubble.innerText = msg.text;
                }
                msgContainer.appendChild(bubble);
            });

            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        async function ollamaStatus() {
            try {
                const res = await fetch('/api/ollama-status');
                const data = await res.json();
                return data.ok === true;
            } catch (err) {
                return false;
            }
        }

        async function initOllamaStatus() {
            if (!useServerApi) return;
            const isOnline = await ollamaStatus();
            const warning = document.getElementById('ollama-warning');
            const input = document.getElementById('userInput');
            const sendBtn = document.querySelector('.input-area button');
            if (!isOnline) {
                warning.style.display = 'block';
                input.disabled = true;
                sendBtn.disabled = true;
            } else {
                fetch('/api/warmup').catch(() => {});
            }
        }

        function getCurrentPersonaName() {
            const persona = getPagePersona();
            return (persona && PERSONA_BADGES[persona]) ? PERSONA_BADGES[persona].label : 'AI';
        }

        let _typingBubbleCount = 0;

        function addTypingBubble(label) {
            const id = `typing-${Date.now()}-${++_typingBubbleCount}`;
            const bubble = document.createElement('div');
            bubble.className = 'ai-bubble bubble';
            bubble.id = id;
            bubble.innerHTML = `<div class="typing"><span>${label} is thinking</span><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            document.getElementById('messages').appendChild(bubble);
            const chatWindow = document.getElementById('chat-window');
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }

        function replaceTypingBubble(id, finalText, modelName) {
            const bubble = document.getElementById(id);
            if (!bubble) return;
            bubble.innerHTML = '';
            if (modelName) {
                const label = document.createElement('div');
                label.className = 'ai-model-label';
                label.textContent = modelName;
                bubble.appendChild(label);
                const textDiv = document.createElement('div');
                textDiv.className = 'ai-bubble-text';
                textDiv.innerText = finalText;
                bubble.appendChild(textDiv);
            } else {
                bubble.innerText = finalText;
            }
            const chatWindow = document.getElementById('chat-window');
            chatWindow.scrollTop = chatWindow.scrollHeight;
            renderConversationList();
        }

        function switchConversation(conversationId) {
            if (conversationId === activeConversationId) return;
            const current = getActiveConversation();
            if (current && current.isDraft && current.messages.length === 0) {
                conversations = conversations.filter(c => c.id !== current.id);
            }
            activeConversationId = conversationId;
            saveConversations();
            renderConversationList();
            renderMessages();
        }

        function createNewConversation() {
            const current = getActiveConversation();
            const currentIsEmpty = current && Array.isArray(current.messages) && current.messages.length === 0;
            if (currentIsEmpty) {
                activeConversationId = current.id;
                saveConversations();
                renderConversationList();
                renderMessages();
                return;
            }

            if (useServerApi) {
                (async () => {
                    try {
                        const res = await fetch('/api/conversations', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ persona: getPagePersona() })
                        });
                        const data = await res.json();
                        await syncConversationsFromServer();
                        activeConversationId = data.conversation.id;
                        renderConversationList();
                        renderMessages();
                    } catch (err) {
                        console.error('Failed to create conversation:', err);
                    }
                })();
                return;
            }

            const created = buildConversation();
            conversations.push(created);
            activeConversationId = created.id;
            saveConversations();
            renderConversationList();
            renderMessages();
        }

        function togglePin(conversationId) {
            const conv = conversations.find(c => c.id === conversationId);
            if (!conv) {
                return;
            }

            if (useServerApi) {
                (async () => {
                    try {
                        await fetch(`/api/conversations/${conversationId}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ pinned: !conv.pinned })
                        });
                        await syncConversationsFromServer();
                    } catch (error) {
                        console.error(error);
                    }
                })();
                return;
            }

            conv.pinned = !conv.pinned;
            conv.updatedAt = Date.now();
            saveConversations();
            renderConversationList();
        }

        function deleteConversation(conversationId) {
            const conv = conversations.find(c => c.id === conversationId);
            if (!conv) {
                return;
            }

            const shouldDelete = window.confirm(`Delete conversation "${conv.title}"?`);
            if (!shouldDelete) {
                return;
            }

            if (useServerApi) {
                (async () => {
                    try {
                        await fetch(`/api/conversations/${conversationId}`, {
                            method: 'DELETE'
                        });
                        await syncConversationsFromServer();
                    } catch (error) {
                        console.error(error);
                    }
                })();
                return;
            }

            const wasActive = (conversationId === activeConversationId);
            conversations = conversations.filter(c => c.id !== conversationId);

            if (!conversations.length) {
                const created = buildConversation();
                conversations.push(created);
                activeConversationId = created.id;
            } else if (wasActive) {
                activeConversationId = sortedConversations()[0].id;
            }

            saveConversations();
            renderConversationList();
            renderMessages();
        }

        async function addMessage(type, text) {
            const current = getActiveConversation();
            if (!current) {
                return;
            }

            if (useServerApi) {
                let targetConversationId = current.id;

                if (current.isDraft && type === 'user-bubble') {
                    const createResponse = await fetch('/api/conversations', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ persona: getPagePersona() })
                    });

                    if (createResponse.status === 401) {
                        window.location.href = '/';
                        return;
                    }

                    if (!createResponse.ok) {
                        throw new Error('Failed to create conversation.');
                    }

                    const createPayload = await createResponse.json();
                    if (!createPayload || !createPayload.conversation || !createPayload.conversation.id) {
                        throw new Error('Invalid conversation response from server.');
                    }

                    targetConversationId = createPayload.conversation.id;
                    activeConversationId = targetConversationId;
                }

                const response = await fetch(`/api/conversations/${targetConversationId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, text })
                });

                if (response.status === 401) {
                    window.location.href = '/';
                    return;
                }

                await syncConversationsFromServer();
                return;
            }

            current.messages.push({
                type,
                text,
                at: Date.now()
            });

            if (current.title === 'New Conversation' && type === 'user-bubble') {
                current.title = text.length > 28 ? `${text.slice(0, 28)}...` : text;
            }

            current.updatedAt = Date.now();
            saveConversations();
            renderConversationList();
            renderMessages();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) {
                return;
            }

            await addMessage('user-bubble', text);
            input.value = '';

            if (useServerApi) {
                const current = getActiveConversation();
                if (!current) {
                    return;
                }

                const selectedModels = getSelectedModels();
                const isMulti = selectedModels.length > 1;
                let typingIds;

                if (isMulti) {
                    typingIds = selectedModels.map(m => addTypingBubble(m));
                } else {
                    typingIds = [addTypingBubble(getCurrentPersonaName())];
                }

                let response;
                try {
                    const body = selectedModels.length > 0 ? { models: selectedModels } : {};
                    response = await fetch(`/api/conversations/${current.id}/ai-reply`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                } catch (err) {
                    typingIds.forEach(id => replaceTypingBubble(id, 'Could not connect to the server. Please check your connection.'));
                    return;
                }

                if (response.status === 401) {
                    window.location.href = '/';
                    return;
                }

                if (response.status === 503) {
                    typingIds.forEach(id => replaceTypingBubble(id, 'Ollama is not running. Please start Ollama and try again.'));
                    return;
                }

                if (!response.ok) {
                    typingIds.forEach(id => replaceTypingBubble(id, 'Something went wrong. Please try again.'));
                    return;
                }

                const data = await response.json();
                await syncConversationsData();

                if (isMulti && Array.isArray(data.responses)) {
                    data.responses.forEach((r, i) => {
                        replaceTypingBubble(typingIds[i], r.text, r.model);
                    });
                } else {
                    replaceTypingBubble(typingIds[0], data.aiReply);
                }
                return;
            }

            // Placeholder local reply so the UI still works without backend integration.
            setTimeout(() => {
                addMessage('ai-bubble', 'Thanks for your message. A real AI backend can be connected next.');
            }, 450);
        }

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

        function getSelectedModels() {
            return [...document.querySelectorAll('#model-checkboxes input[type="checkbox"]:checked')]
                .map(cb => cb.value);
        }

        async function loadAvailableModels() {
            if (!useServerApi) return;
            try {
                const res = await fetch('/api/ollama-models');
                if (!res.ok) return;
                const data = await res.json();
                const models = data.models || [];
                if (!models.length) return;

                const container = document.getElementById('model-checkboxes');
                const selector = document.getElementById('model-selector');
                if (!container || !selector) return;

                container.innerHTML = '';
                const DEFAULT_MODEL = 'llama3.2:latest';
                const hasDefault = models.includes(DEFAULT_MODEL);
                models.forEach((model, index) => {
                    const lbl = document.createElement('label');
                    lbl.className = 'model-checkbox-label';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.value = model;
                    cb.checked = hasDefault ? model === DEFAULT_MODEL : index === 0;
                    cb.addEventListener('change', () => {
                        const checkedCount = document.querySelectorAll('#model-checkboxes input:checked').length;
                        if (checkedCount === 0) { cb.checked = true; return; }
                        document.querySelectorAll('#model-checkboxes input').forEach(el => {
                            el.disabled = !el.checked && checkedCount >= 3;
                        });
                    });
                    lbl.appendChild(cb);
                    lbl.appendChild(document.createTextNode(' ' + model));
                    container.appendChild(lbl);
                });

                selector.style.display = 'flex';
            } catch { }
        }

        function initHeaderPersonaBadge() {
            const persona = getPagePersona();
            const container = document.getElementById('chat-persona-badge');
            if (!container) return;
            if (persona && PERSONA_BADGES[persona]) {
                const badge = document.createElement('span');
                badge.className = `persona-badge persona-badge-${persona}`;
                badge.textContent = `${PERSONA_BADGES[persona].emoji} ${PERSONA_BADGES[persona].label}`;
                container.appendChild(badge);
            }
        }

        async function initChat() {
            if (useServerApi) {
                try {
                    activeConversationId = localStorage.getItem(ACTIVE_KEY);
                    await syncConversationsFromServer();
                    if (!getActiveConversation()) {
                        openFreshDraftSession();
                    }
                    saveConversations();
                    renderConversationList();
                    renderMessages();
                } catch (error) {
                    console.error(error);
                    ensureDraftConversation();
                    renderConversationList();
                    renderMessages();
                }
                initOllamaStatus();
                loadAvailableModels();
                return;
            }

            loadConversationsFromLocal();
            renderConversationList();
            renderMessages();
        }

        initHeaderPersonaBadge();
        initChat();
    </script>

    <button onclick="logout()" class="logout-btn">Log Out</button>
    <button onclick="window.location.href='/choose-player'" class="back-btn">&#8592; Characters</button>

    <div id="settings-overlay" class="settings-overlay" onclick="closeSettings()" style="display:none;"></div>
    <div id="settings-panel" class="settings-panel" style="display:none;">
        <h2 class="settings-title">Accessibility</h2>

        <div class="settings-row">
            <label class="settings-label" for="toggle-bold">Bold message text</label>
            <input type="checkbox" id="toggle-bold" onchange="applySettings()">
        </div>

        <div class="settings-row">
            <label class="settings-label">Font size</label>
            <div class="settings-radio-group">
                <label><input type="radio" name="font-size" value="normal" checked onchange="applySettings()"> Normal</label>
                <label><input type="radio" name="font-size" value="large" onchange="applySettings()"> Large</label>
                <label><input type="radio" name="font-size" value="xlarge" onchange="applySettings()"> Extra large</label>
            </div>
        </div>

        <div class="settings-row">
            <label class="settings-label" for="toggle-spacing">Increased line spacing</label>
            <input type="checkbox" id="toggle-spacing" onchange="applySettings()">
        </div>

        <button class="settings-close-btn" onclick="closeSettings()">Close</button>
    </div>

<script>
    async function logout() {
        if (typeof window.fetch === 'function' && window.location.protocol.startsWith('http')) {
            try {
                await fetch('/api/logout', { method: 'POST' });
            } catch (error) {
                console.error(error);
            }
        }

        alert("You have been logged out.");
        window.location.href = "/";
    }

    const SETTINGS_KEY = 'llmChatSettings';

    function loadSettings() {
        try {
            return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
        } catch (e) {
            return {};
        }
    }

    function saveSettings(s) {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
    }

    function applySettings() {
        const bold    = document.getElementById('toggle-bold').checked;
        const spacing = document.getElementById('toggle-spacing').checked;
        const size    = document.querySelector('input[name="font-size"]:checked').value;

        const body = document.body;
        body.classList.toggle('a11y-bold',    bold);
        body.classList.toggle('a11y-spacing', spacing);
        body.classList.remove('a11y-font-large', 'a11y-font-xlarge');
        if (size === 'large')  body.classList.add('a11y-font-large');
        if (size === 'xlarge') body.classList.add('a11y-font-xlarge');

        saveSettings({ bold, spacing, size });
    }

    function openSettings() {
        const s = loadSettings();
        document.getElementById('toggle-bold').checked    = !!s.bold;
        document.getElementById('toggle-spacing').checked = !!s.spacing;
        const sizeVal = s.size || 'normal';
        document.querySelector(`input[name="font-size"][value="${sizeVal}"]`).checked = true;
        applySettings();
        document.getElementById('settings-overlay').style.display = 'block';
        document.getElementById('settings-panel').style.display    = 'flex';
    }

    function closeSettings() {
        document.getElementById('settings-overlay').style.display = 'none';
        document.getElementById('settings-panel').style.display    = 'none';
    }

    (function initSettings() {
        const s = loadSettings();
        if (!s || !Object.keys(s).length) return;
        const body = document.body;
        if (s.bold)    body.classList.add('a11y-bold');
        if (s.spacing) body.classList.add('a11y-spacing');
        if (s.size === 'large')  body.classList.add('a11y-font-large');
        if (s.size === 'xlarge') body.classList.add('a11y-font-xlarge');
    })();
</script>
</body>
</html>
