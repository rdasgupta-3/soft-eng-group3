<!DOCTYPE html>
<html>
<head>
    <title>LLM Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-window">
        <div id="messages"></div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message here..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const msgContainer = document.getElementById('messages');
            if (input.value.trim() !== "") {
                const bubble = document.createElement('div');
                bubble.className = 'bubble user-bubble';
                bubble.innerText = input.value;
                msgContainer.appendChild(bubble);
                input.value = ""; // Erase text after send
                msgContainer.scrollTop = msgContainer.scrollHeight;
            }
        }
        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
    </script>

    <button onclick="logout()" style="position: absolute; top: 20px; right: 20px; background-color: #dc3545; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Log Out</button>

<script>
    function logout() {
        // In the future, this will tell the backend to destroy the session cookie
        alert("You have been logged out.");
        window.location.href = "/";
    }
</script>
</body>
</html>
