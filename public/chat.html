<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - LLM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">
    <div class="chat-shell">
        <aside class="chat-history-panel">
            <div class="history-header">
                <h2>Chat History</h2>
                <button id="new-chat-btn" type="button" onclick="createNewConversation()">+ New</button>
            </div>
            <div class="history-search-wrap">
                <input type="text" id="history-search" placeholder="Search chats..." oninput="updateHistorySearch(this.value)">
            </div>
            <div id="conversation-list"></div>
        </aside>

        <section class="chat-main">

            <!--ollama warning if not available -->
            <div id = "ollama-warning" style="display: none; background: #ffdddd; color: #a00;
            padding: 12px; border: 1px solid #a00; border-radius: 6px; margin-bottom: 10px;">

            <strong>Ollama is not installed or not running.</strong><br>
            Please install it from <a href="https://ollama.com" target="_blank">https://ollama.com</a><br>
            Then run: <code>ollama serve</code>
            </div>

            <header class="chat-header">
                <div>
                    <h1>AI Chat Assistant</h1>
                    <p>Ask anything and continue the conversation naturally.</p>
                </div>
                <button onclick="location.href='/players.html'" class="back-btn">← Change Persona</button>
            </header>

            <div id="chat-window">
                <div id="messages"></div>
            </div>

            <div class="input-area">
                <div id= "accessibility-controls">
                    <button id = "boldToggleBtn">Bold</button>
                    <button id = "increaseTextBtn">A+</button>
                    <button id = "decreaseTextBtn">A-</button>
                </div>

                <input type="text" id="userInput" placeholder="Type your message here..." onkeypress="handleKey(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </section>
    </div>

    <script>
        const STORAGE_KEY = 'llmChatConversations';
        const ACTIVE_KEY = 'llmActiveConversationId';
        const useServerApi = (
            typeof window.fetch === 'function' &&
            window.location.protocol.startsWith('http') &&
            !/jsdom/i.test(window.navigator.userAgent || '')
        );

        let conversations = [];
        let boldEnabled= false;
        let currTextSize = 16;

        // checking for ollama
        async function ollamaStatus(){
            const res = await fetch('/api/ollama-status');
            const data = await res.json();
            return data.ok;
        }

        async function initOllamaStatus(){
            const isOnline = await ollamaStatus();

            const warning = document.getElementById('ollama-warning');
            const input = document.getElementById('userInput');
            const sendBtn = document.querySelector('.input-area button');

            if (!isOnline) {
                warning.style.display = 'block';
                input.disabled = true;
                sendBtn.disabled = true;
                addMessage("ai-bubble", "Sorry, I can't talk right now. Please check the warning above.");

            }

        }

        window.addEventListener('DOMContentLoaded', initOllamaStatus);
        document.getElementById('boldToggleBtn').addEventListener('click', toggleBold);
        document.getElementById('increaseTextBtn').addEventListener('click', increaseTextSize);
        document.getElementById('decreaseTextBtn').addEventListener('click', decreaseTextSize);

        let activeConversationId = null;
        let historySearchQuery = '';

        function loadConversationsFromLocal() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                conversations = saved ? JSON.parse(saved) : [];
            } catch (error) {
                conversations = [];
            }

            activeConversationId = localStorage.getItem(ACTIVE_KEY);

            if (!conversations.length) {
                const first = buildConversation();
                conversations.push(first);
                activeConversationId = first.id;
                saveConversations();
            }

            if (!conversations.find(c => c.id === activeConversationId)) {
                activeConversationId = conversations[0].id;
            }
        }

        async function syncConversationsFromServer() {
            const response = await fetch('/api/conversations');
            if (response.status === 401) {
                window.location.href = '/';
                return;
            }
            if (!response.ok) {
                throw new Error('Failed to load conversations from server.');
            }

            const payload = await response.json();
            conversations = Array.isArray(payload.conversations) ? payload.conversations : [];

            if (conversations.length && !conversations.find(c => c.id === activeConversationId)) {
                activeConversationId = conversations[0].id;
            }

            saveConversations();
            renderConversationList();
            renderMessages();
        }

        function saveConversations() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
            localStorage.setItem(ACTIVE_KEY, activeConversationId);
        }

        function buildConversation() {
            const now = Date.now();
            return {
                id: `conv-${now}-${Math.floor(Math.random() * 10000)}`,
                title: 'New Conversation',
                pinned: false,
                isDraft: false,
                updatedAt: now,
                messages: []
            };
        }

        function buildDraftConversation() {
            const draft = buildConversation();
            draft.isDraft = true;
            return draft;
        }

        function ensureDraftConversation() {
            if (conversations.length) {
                return;
            }

            const draft = buildDraftConversation();
            conversations = [draft];
            activeConversationId = draft.id;
        }

        function openFreshDraftSession() {
            const draft = buildDraftConversation();
            conversations.unshift(draft);
            activeConversationId = draft.id;
        }

        function getActiveConversation() {
            return conversations.find(c => c.id === activeConversationId);
        }

        function sortedConversations() {
            return [...conversations].sort((a, b) => {
                if (a.pinned !== b.pinned) {
                    return a.pinned ? -1 : 1;
                }
                return b.updatedAt - a.updatedAt;
            });
        }

        function updateHistorySearch(value) {
            historySearchQuery = (value || '').trim().toLowerCase();
            renderConversationList();
        }

        function conversationMatchesSearch(conv) {
            if (!historySearchQuery) {
                return true;
            }

            const titleText = (conv.title || '').toLowerCase();
            const messageText = (conv.messages || [])
                .map(m => (m && m.text ? m.text : ''))
                .join(' ')
                .toLowerCase();

            return titleText.includes(historySearchQuery) || messageText.includes(historySearchQuery);
        }

        function hasUserMessages(conv) {
            return (conv.messages || []).some(msg => msg && msg.type === 'user-bubble' && (msg.text || '').trim().length > 0);
        }

        function renderConversationList() {
            const list = document.getElementById('conversation-list');
            list.innerHTML = '';

            const ordered = sortedConversations().filter(conversationMatchesSearch);
            if (!ordered.length) {
                const empty = document.createElement('div');
                empty.className = 'history-empty-state';
                empty.innerText = historySearchQuery ? 'No matching conversations.' : 'No conversations yet.';
                list.appendChild(empty);
                return;
            }

            const pinned = ordered.filter(conv => conv.pinned);
            const unpinned = ordered.filter(conv => !conv.pinned);

            function appendConversationItem(conv) {
                const item = document.createElement('div');
                item.className = `history-item ${conv.id === activeConversationId ? 'active' : ''}`;
                item.onclick = () => switchConversation(conv.id);

                const title = document.createElement('div');
                title.className = 'history-title';
                title.innerText = conv.title;

                const preview = document.createElement('div');
                preview.className = 'history-preview';
                const last = conv.messages[conv.messages.length - 1];
                preview.innerText = last ? last.text : 'No messages yet';

                item.appendChild(title);
                item.appendChild(preview);

                if (hasUserMessages(conv)) {
                    const pinBtn = document.createElement('button');
                    pinBtn.type = 'button';
                    pinBtn.className = 'history-pin-btn';
                    pinBtn.innerText = conv.pinned ? '★' : '☆';
                    pinBtn.title = conv.pinned ? 'Unpin conversation' : 'Pin conversation';
                    pinBtn.setAttribute('aria-label', pinBtn.title);
                    pinBtn.onclick = (event) => {
                        event.stopPropagation();
                        togglePin(conv.id);
                    };

                    const deleteBtn = document.createElement('button');
                    deleteBtn.type = 'button';
                    deleteBtn.className = 'history-delete-btn';
                    deleteBtn.innerText = '×';
                    deleteBtn.title = 'Delete conversation';
                    deleteBtn.setAttribute('aria-label', deleteBtn.title);
                    deleteBtn.onclick = (event) => {
                        event.stopPropagation();
                        deleteConversation(conv.id);
                    };

                    const actions = document.createElement('div');
                    actions.className = 'history-actions';
                    actions.appendChild(pinBtn);
                    actions.appendChild(deleteBtn);
                    item.appendChild(actions);
                }

                list.appendChild(item);
            }

            if (pinned.length) {
                const pinnedLabel = document.createElement('div');
                pinnedLabel.className = 'history-separator';
                pinnedLabel.innerText = 'STARRED';
                list.appendChild(pinnedLabel);
            }

            pinned.forEach(appendConversationItem);

            if (pinned.length && unpinned.length) {
                const divider = document.createElement('div');
                divider.className = 'history-divider';
                list.appendChild(divider);
            }

            unpinned.forEach(appendConversationItem);
        }

        function renderMessages(skipLastAi = false) {
            const msgContainer = document.getElementById('messages');
            const current = getActiveConversation();
            msgContainer.innerHTML = '';

            if (!current) {
                return;
            }

            const messages = [...current.messages];

            if(skipLastAi){
                const last = messages[messages.length - 1];
                if(last && last.type === 'ai-bubble'){
                    messages.pop();
                }
            }

            messages.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = `bubble ${msg.type}`;
                bubble.innerText = msg.text;
                applyFormatting(bubble);
                msgContainer.appendChild(bubble);
            });

            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        function switchConversation(conversationId) {
            activeConversationId = conversationId;
            saveConversations();
            renderConversationList();
            renderMessages();
        }

        function createNewConversation() {
            const current = getActiveConversation();
            const currentIsEmpty = current && Array.isArray(current.messages) && current.messages.length === 0;
            if (currentIsEmpty) {
                activeConversationId = current.id;
                saveConversations();
                renderConversationList();
                renderMessages();
                return;
            }

            if (useServerApi) {
                const draft = buildDraftConversation();
                conversations.push(draft);
                activeConversationId = draft.id;
                saveConversations();
                renderConversationList();
                renderMessages();
                return;
            }

            const created = buildConversation();
            conversations.push(created);
            activeConversationId = created.id;
            saveConversations();
            renderConversationList();
            renderMessages();
        }

        function togglePin(conversationId) {
            const conv = conversations.find(c => c.id === conversationId);
            if (!conv) {
                return;
            }

            if (useServerApi) {
                (async () => {
                    try {
                        await fetch(`/api/conversations/${conversationId}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ pinned: !conv.pinned })
                        });
                        await syncConversationsFromServer();
                    } catch (error) {
                        console.error(error);
                    }
                })();
                return;
            }

            conv.pinned = !conv.pinned;
            conv.updatedAt = Date.now();
            saveConversations();
            renderConversationList();
        }

        function deleteConversation(conversationId) {
            const conv = conversations.find(c => c.id === conversationId);
            if (!conv) {
                return;
            }

            const shouldDelete = window.confirm(`Delete conversation "${conv.title}"?`);
            if (!shouldDelete) {
                return;
            }

            if (useServerApi) {
                (async () => {
                    try {
                        await fetch(`/api/conversations/${conversationId}`, {
                            method: 'DELETE'
                        });
                        await syncConversationsFromServer();
                    } catch (error) {
                        console.error(error);
                    }
                })();
                return;
            }

            const wasActive = (conversationId === activeConversationId);
            conversations = conversations.filter(c => c.id !== conversationId);

            if (!conversations.length) {
                const created = buildConversation();
                conversations.push(created);
                activeConversationId = created.id;
            } else if (wasActive) {
                activeConversationId = sortedConversations()[0].id;
            }

            saveConversations();
            renderConversationList();
            renderMessages();
        }

        async function addMessage(type, text) {
            const current = getActiveConversation();
            if (!current) {
                return;
            }

            if (useServerApi) {
                let targetConversationId = current.id;

                if (current.isDraft && type === 'user-bubble') {
                    const createResponse = await fetch('/api/conversations', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (createResponse.status === 401) {
                        window.location.href = '/';
                        return;
                    }

                    if (!createResponse.ok) {
                        throw new Error('Failed to create conversation.');
                    }

                    const createPayload = await createResponse.json();
                    if (!createPayload || !createPayload.conversation || !createPayload.conversation.id) {
                        throw new Error('Invalid conversation response from server.');
                    }

                    targetConversationId = createPayload.conversation.id;
                    activeConversationId = targetConversationId;
                }

                const response = await fetch(`/api/conversations/${targetConversationId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, text })
                });

                if (response.status === 401) {
                    window.location.href = '/';
                    return;
                }

                await syncConversationsFromServer();
                return;
            }

            current.messages.push({
                type,
                text,
                at: Date.now()
            });

            if (current.title === 'New Conversation' && type === 'user-bubble') {
                current.title = text.length > 28 ? `${text.slice(0, 28)}...` : text;
            }

            current.updatedAt = Date.now();
            saveConversations();
            renderConversationList();
            renderMessages();
        }

        function getCurrentPersonaName(){
            const params = new URLSearchParams(window.location.search);
            const persona = params.get('persona');

            if(persona === 'sweetheart') return 'Miss Sweetheart';
            if(persona === 'professional') return 'Mr. Professional';
            if(persona === 'silly') return "Lord Silly The Ninth";

            return 'AI';
        }

        function addTypingBubble(personaName){
            const id = `typing-${Date.now()}`;

            const bubble = document.createElement('div');
            bubble.className = 'ai-bubble bubble'
            bubble.id = id;

            bubble.innerHTML = `
                <div class="typing">
                    <span>${personaName} is thinking</span>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;

            document.querySelector('#messages').appendChild(bubble);
            applyFormatting(bubble);
            return id;
        }   

        function replaceTypingBubble(id,finalText){
            const bubble = document.getElementById(id);
            if(!bubble) return;

            bubble.innerHTML = "";

            const html = parseFormattedText(finalText);
            const temp = document.createElement("div");
            temp.innerHTML = html;
            
            applyFormatting(bubble);
            
            let nodes = Array.from(temp.childNodes);
            let index = 0;

            function typeNode(){
                
                if(index >= nodes.length) return;

                let node = nodes[index];

                if(node.nodeType === Node.TEXT_NODE){

                    let span = document.createElement("span");
                    bubble.appendChild(span);

                    let text = node.textContent;
                    let i = 0;

                    function typeChar(){
                        if(i < text.length) {
                            span.textContent += text[i];
                            i++;
                            applyFormatting(span);
                            const chatWindow = document.getElementById('chat-window');
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                            setTimeout(typeChar, 18);
                        } else {
                            index++;
                            typeNode();
                        }
                    }

                    typeChar();
                } else {
                    let clone = node.cloneNode(true);
                    bubble.appendChild(clone);
                    applyFormatting(clone);
                    index++;
                    setTimeout(typeNode, 18);
                }
            }

            typeNode();
        }

        function toggleBold(){
            boldEnabled= !boldEnabled;
            applyFormattingToAll();
        }

        function increaseTextSize(){
            currTextSize += 2;
            applyFormattingToAll();
        }

        function decreaseTextSize(){
            currTextSize = Math.max(10, currTextSize - 2);
            applyFormattingToAll();
        }

        function applyFormatting(messageEl){
            if(boldEnabled){
                messageEl.classList.add('bold');
            } else {
                messageEl.classList.remove('bold');
            }
            messageEl.style.fontSize = currTextSize + "px";
        }

        function applyFormattingToAll(){
            const chatWindow = document.getElementById('chat-window');
            if(chatWindow){
                if(boldEnabled){
                    chatWindow.classList.add('bold');
                } else {
                    chatWindow.classList.remove('bold');
                }
                chatWindow.style.fontSize = currTextSize + "px";
            }

            const bubbles = document.querySelectorAll('#messages .bubble');
            bubbles.forEach(bubble => {
                applyFormatting(bubble);
                bubble.querySelectorAll('*').forEach(child => {
                    applyFormatting(child);
                });
            });
        }

        function parseFormattedText(text){

            text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>"); 
            text = text.replace(/\*(.*?)\*/g, "<em>$1</em>");
            text = text.replace(/\n/g, "<br>");
            return text;
        }


        async function sendMessage() {
            const isOnline = await ollamaStatus();
            if (!isOnline) {
                await addMessage("ai-bubble", "Sorry, I can't respond right now :(");
                return;
            }

            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            await addMessage('user-bubble', text);

            if (useServerApi) {
                const current = getActiveConversation(); 
                if (!current) return;

                if (!current.selectedModel) {
                    await getMultiModelReplies(current.id, text);
                } else {
                    await getSingleModelReply(current.id, text);
                }
                return;
            }

            const typingId = addTypingBubble('AI');
            setTimeout(() => {
                replaceTypingBubble(typingId, 'No backend connected.');
            }, 450);
        }

    
       async function getMultiModelReplies(conversationId, text) {
            const typingId = addTypingBubble(getCurrentPersonaName());

            const urlParams = new URLSearchParams(window.location.search);
            const selectedPersona = urlParams.get("persona") || "sweetheart";

            const res = await window.fetch(`/api/conversations/${conversationId}/multi-reply`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ persona: selectedPersona })
            });

            const data = await res.json();

            const bubble = document.getElementById(typingId);
            if (bubble) bubble.remove();

            const messagesEl = document.getElementById('messages');

            if (!messagesEl) return data;

            const models = [
                { key: "phi",      label: "Phi",      text: data.phi },
                { key: "gemma",    label: "Gemma",    text: data.gemma },
                { key: "deepseek", label: "DeepSeek", text: data.deepseek }
            ];

            const validModels = models.filter(m => m.text && !m.text.includes('failed to respond'));

            if (!validModels.length) {
                const errBubble = document.createElement('div');
                errBubble.className = 'bubble ai-bubble';
                errBubble.textContent = "Sorry, all models failed to respond. Please try again.";
                messagesEl.appendChild(errBubble);
                return data;
            }

            const container = document.createElement('div');
            container.className = 'multi-model-container';
            container.id = 'multi-model-container';

            validModels.forEach(m => {
                const wrapper = document.createElement('div');
                wrapper.className = 'bubble ai-bubble multi-bubble';
                wrapper.id = `multi-bubble-${m.key}`;

                const label = document.createElement('div');
                label.className = 'multi-model-label';
                label.textContent = m.label;

                const textDiv = document.createElement('div');
                textDiv.className = 'multi-model-text';
                textDiv.id = `multi-text-${m.key}`;

                const btn = document.createElement('button');
                btn.className = 'multi-model-select-btn';
                btn.id = `multi-btn-${m.key}`;
                btn.textContent = `Use ${m.label}`;
                btn.onclick = () => selectModel(conversationId, m.key, m.text);

                wrapper.appendChild(label);
                wrapper.appendChild(textDiv);
                wrapper.appendChild(btn);
                container.appendChild(wrapper);
            });

            messagesEl.appendChild(container);
            applyFormattingToAll();

            for (const m of validModels) {
                await window.animateIntoElement(`multi-text-${m.key}`, m.text);  
            }

            return data;
        }

        function animateIntoElement(elementId, finalText) {
            return new Promise(resolve => {
                const el = document.getElementById(elementId);
                if (!el) { resolve(); return; }

                el.innerHTML = '';
                const html = parseFormattedText(finalText);
                const temp = document.createElement('div');
                temp.innerHTML = html;

                const nodes = Array.from(temp.childNodes);
                let index = 0;

                function typeNode() {
                    if (index >= nodes.length) { resolve(); return; }

                    const node = nodes[index];
                    if (node.nodeType === Node.TEXT_NODE) {
                        const span = document.createElement('span');
                        el.appendChild(span);
                        const text = node.textContent;
                        let i = 0;

                        function typeChar() {
                            if (i < text.length) {
                                span.textContent += text[i];
                                i++;
                                document.getElementById('chat-window').scrollTop = 
                                    document.getElementById('chat-window').scrollHeight;
                                setTimeout(typeChar, 18);
                            } else {
                                index++;
                                typeNode();
                            }
                        }
                        typeChar();
                    } else {
                        el.appendChild(node.cloneNode(true));
                        index++;
                        setTimeout(typeNode, 18);
                    }
                }
                typeNode();
            });
        }

        async function selectModel(conversationId, modelKey, chosenText) {
            const btn = document.getElementById(`multi-btn-${modelKey}`);
            if (btn) btn.disabled = true;

            const selectRes = await fetch(`/api/conversations/${conversationId}/select-model`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ modelKey })
            });

            if (!selectRes.ok) {
                console.error('[selectModel] Failed to save model selection on server');
                if (btn) btn.disabled = false;
                return;
            }

            const container = document.getElementById('multi-model-container');
            if (container) container.remove();

            await addMessage('ai-bubble', chosenText);

            const conv = getActiveConversation();
            if (conv) conv.selectedModel = modelKey;

            saveConversations();
        }
        
        async function getSingleModelReply(conversationId, text, modelOverride) {
            const typingId = addTypingBubble(getCurrentPersonaName());

            const res = await fetch(`/api/conversations/${conversationId}/ai-reply`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: text, modelOverride })
            });

            const data = await res.json();
            replaceTypingBubble(typingId, data.aiReply);

            // Return model info so tests can inspect it
            return { aiReply: data.aiReply, model: modelOverride || data.model };
        }

        function getSelectedPersona() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get("persona") || "sweetheart";
        }

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

        async function initChat() {
            if (useServerApi) {
                try {
                    await syncConversationsFromServer();
                    openFreshDraftSession();
                    saveConversations();
                    renderConversationList();
                    renderMessages();
                } catch (error) {
                    console.error(error);
                    ensureDraftConversation();
                    renderConversationList();
                    renderMessages();
                }
                return;
            }

            loadConversationsFromLocal();
            renderConversationList();
            renderMessages();
        }

        initChat();

       if (typeof window !== 'undefined') {
            window.getMultiModelReplies = getMultiModelReplies;
            window.getSingleModelReply = getSingleModelReply;
            window.getSelectedPersona = getSelectedPersona;
            window.addTypingBubble = addTypingBubble;
            window.getCurrentPersonaName = getCurrentPersonaName;
            window.animateIntoElement = animateIntoElement;

            let _testSelectedModel = null;
            window.setPreferredModel = function(modelKey) {
                _testSelectedModel = modelKey;
            };
            window.getPreferredModel = function() {
                return _testSelectedModel;
            };

            window.getResponsesFromModels = async function(prompt) {
                const conv = getActiveConversation();
                const id = conv?.id || "test-conv-123";
                return await getMultiModelReplies(id, prompt);
            };

            window.generateReply = async function(text) {
                return await getSingleModelReply("123", text, window.getPreferredModel());
            };
        }
        
    </script>

    <button onclick="logout()" class="logout-btn">Log Out</button>

<script>
    async function logout() {
        if (typeof window.fetch === 'function' && window.location.protocol.startsWith('http')) {
            try {
                await fetch('/api/logout', { method: 'POST' });
            } catch (error) {
                console.error(error);
            }
        }

        alert("You have been logged out.");
        window.location.href = "/";
    }
</script>
