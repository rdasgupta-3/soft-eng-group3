<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Forgot Password</h1>
        <p style="margin-top: -10px; color: #666;">Enter your email to generate a reset link.</p>

        <div id="error-message" style="color: #d32f2f; display: none; margin-bottom: 10px; background: #ffebee; padding: 8px; border-radius: 4px;"></div>
        <div id="success-message" style="color: #155724; display: none; margin-bottom: 10px; background: #d4edda; padding: 8px; border-radius: 4px;"></div>
        <div id="preview-link" style="display: none; margin-bottom: 10px;"></div>

        <input type="email" id="email" placeholder="Email" required>

        <button onclick="requestReset()" style="width: 100%; background-color: #007bff; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;">Send Reset Link</button>
        <button onclick="location.href='/'" style="width: 100%; background-color: transparent; color: #007bff; padding: 10px; border: none; cursor: pointer; margin-top: 5px;">Back to Login</button>
    </div>

    <script>
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        async function requestReset() {
            const email = document.getElementById('email').value.trim();
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            const previewDiv = document.getElementById('preview-link');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            previewDiv.style.display = 'none';

            if (!email) {
                errorDiv.innerText = 'Email is required.';
                errorDiv.style.display = 'block';
                return;
            }

            if (!emailRegex.test(email)) {
                errorDiv.innerText = 'Please enter a valid email address (example@domain.com).';
                errorDiv.style.display = 'block';
                return;
            }

            const response = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const result = await response.json();

            if (!response.ok) {
                errorDiv.innerText = result.error || 'Unable to process request.';
                errorDiv.style.display = 'block';
                return;
            }

            successDiv.innerText = result.message || 'If this email exists, a reset link has been sent.';
            successDiv.style.display = 'block';

            if (result.previewResetLink) {
                previewDiv.innerHTML = `
                    <div style="background: #fff3cd; color: #856404; padding: 8px; border-radius: 4px; font-size: 0.9em;">
                        Dev preview link (replace with real email service later):
                        <a href="${result.previewResetLink}" style="display: block; margin-top: 5px; color: #007bff; word-break: break-all;">${result.previewResetLink}</a>
                    </div>
                `;
                previewDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
