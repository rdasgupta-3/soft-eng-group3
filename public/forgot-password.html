<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<!-- Rishita Dasgupta wrote this -->
<body>
    <div class="container">
        <h1>Forgot Password</h1>
        <p class="page-subtitle">Enter your email to generate a reset link.</p>

        <div id="error-message" class="status-message is-error" style="display: none;" aria-live="polite"></div>
        <div id="success-message" class="status-message is-success" style="display: none;" aria-live="polite"></div>
        <div id="preview-link" class="preview-link" style="display: none;"></div>

        <input type="email" id="email" placeholder="Email" autocomplete="email" required>

        <button id="forgot-password-btn" class="btn-blue full-width-btn" type="button">Send Reset Link</button>
        <button class="text-btn" type="button" onclick="location.href='/'">Back to Login</button>
    </div>

    <script src="/forgot-password.js"></script>
</body>
</html>
