<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logo-container">
        <img src="images/logo.png" alt="Logo">
    </div>
    <div class="container">
        <h1>Reset Your Password</h1>
        <p style="margin-top: -10px; color: #666;">Choose a new password (minimum 8 characters).</p>

        <div id="error-message" style="color: #d32f2f; display: none; margin-bottom: 10px; background: #ffebee; padding: 8px; border-radius: 4px;"></div>
        <div id="success-message" style="color: #155724; display: none; margin-bottom: 10px; background: #d4edda; padding: 8px; border-radius: 4px;"></div>

        <input type="password" id="new-password" placeholder="New password" required>
        <input type="password" id="confirm-password" placeholder="Confirm new password" required>

        <button onclick="submitReset()" style="width: 100%; background-color: #28a745; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;">Reset Your Password</button>
        <button onclick="location.href='/'" style="width: 100%; background-color: transparent; color: #007bff; padding: 10px; border: none; cursor: pointer; margin-top: 5px;">Back to Login</button>
    </div>

    <script>
        async function submitReset() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const newPassword = document.getElementById('new-password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!token) {
                errorDiv.innerText = 'Reset token missing from URL.';
                errorDiv.style.display = 'block';
                return;
            }

            if (!newPassword || newPassword.length < 8) {
                errorDiv.innerText = 'Password must be at least 8 characters.';
                errorDiv.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                errorDiv.innerText = 'Passwords do not match.';
                errorDiv.style.display = 'block';
                return;
            }

            const response = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });

            const result = await response.json();

            if (!response.ok) {
                errorDiv.innerText = result.error || 'Unable to reset password.';
                errorDiv.style.display = 'block';
                return;
            }

            successDiv.innerText = 'Password reset complete. Redirecting to login...';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/';
            }, 1200);
        }
    </script>
</body>
</html>
