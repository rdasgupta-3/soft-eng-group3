<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Reset Your Password</h1>
        <p class="page-subtitle">Choose a new password with at least 8 characters.</p>

        <div id="error-message" class="status-message is-error" style="display: none;" aria-live="polite"></div>
        <div id="success-message" class="status-message is-success" style="display: none;" aria-live="polite"></div>

        <input type="password" id="new-password" placeholder="New password" autocomplete="new-password" required>
        <input type="password" id="confirm-password" placeholder="Confirm new password" autocomplete="new-password" required>

        <button id="reset-password-btn" class="btn-green full-width-btn" type="button">Reset Your Password</button>
        <button class="text-btn" type="button" onclick="location.href='/'">Back to Login</button>
    </div>

    <script src="/reset-password.js"></script>
</body>
</html>
